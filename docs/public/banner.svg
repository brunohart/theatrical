<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e1a15"/>
      <stop offset="100%" stop-color="#14181c"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8b84b"/>
      <stop offset="100%" stop-color="#c9922a"/>
    </linearGradient>
    <linearGradient id="warmglow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#c9922a" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#c9922a" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="12" fill="url(#bg)"/>

  <!-- Subtle top glow -->
  <rect width="800" height="200" rx="12" fill="url(#warmglow)"/>

  <!-- Grid pattern (designedbybruno signature) -->
  <g stroke="#f8f5ef" stroke-opacity="0.03" stroke-width="0.5">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="500" y1="0" x2="500" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="700" y1="0" x2="700" y2="200"/>
  </g>

  <!-- Icon mark -->
  <rect x="304" y="32" width="36" height="36" rx="8" fill="url(#gold)"/>
  <rect x="314" y="42" width="16" height="16" rx="3" fill="#1e1a15"/>

  <!-- Wordmark -->
  <text x="400" y="110" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="48" font-weight="700" fill="#f8f5ef" letter-spacing="2">theatrical</text>

  <!-- Tagline -->
  <text x="400" y="142" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="16" font-style="italic" fill="#c9922a" letter-spacing="1">the developer platform for cinema technology</text>

  <!-- Decorative accent dots (organic, designedbybruno style) -->
  <circle cx="680" cy="45" r="18" fill="#c9922a" opacity="0.12"/>
  <circle cx="135" cy="155" r="12" fill="#e8b84b" opacity="0.08"/>
  <circle cx="710" cy="160" r="6" fill="#c9922a" opacity="0.15"/>
</svg>
