<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <defs>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.03"/>
      </feComponentTransfer>
      <feComposite in2="SourceGraphic" operator="over"/>
    </filter>
  </defs>

  <!-- Warm parchment background -->
  <rect width="800" height="200" rx="8" fill="#F0EDE6"/>

  <!-- Paper grain texture overlay -->
  <rect width="800" height="200" rx="8" filter="url(#grain)" opacity="0.5"/>

  <!-- Burnt orange signature accent bar — offset from heading (misregistration ghost) -->
  <rect x="248" y="58" width="310" height="3" rx="1" fill="#D4622B" opacity="0.35"/>

  <!-- Icon mark -->
  <rect x="308" y="34" width="32" height="32" rx="6" fill="#1B2D4F"/>
  <rect x="316" y="42" width="16" height="16" rx="3" fill="#D4622B"/>

  <!-- Wordmark — Space Grotesk feel (tight tracking, poster energy) -->
  <text x="400" y="108" text-anchor="middle" font-family="'Space Grotesk', 'SF Pro Display', system-ui, sans-serif" font-size="46" font-weight="700" fill="#1A1A1A" letter-spacing="-1.5">theatrical</text>

  <!-- Tagline — Inter, clean -->
  <text x="400" y="138" text-anchor="middle" font-family="Inter, 'SF Pro Text', system-ui, sans-serif" font-size="14" font-weight="400" fill="#8A8578" letter-spacing="0.5">the developer platform for cinema technology</text>

  <!-- Mono label — archival, systematic -->
  <text x="400" y="172" text-anchor="middle" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="9" font-weight="400" fill="#8A8578" letter-spacing="3" text-transform="uppercase">TYPESCRIPT  ·  C#  ·  PYTHON</text>

  <!-- Subtle broken gradient divider at bottom -->
  <line x1="200" y1="188" x2="340" y2="188" stroke="#D4622B" stroke-opacity="0.2" stroke-width="1"/>
  <line x1="360" y1="188" x2="440" y2="188" stroke="#D4622B" stroke-opacity="0.2" stroke-width="1"/>
  <line x1="460" y1="188" x2="600" y2="188" stroke="#D4622B" stroke-opacity="0.2" stroke-width="1"/>
</svg>
