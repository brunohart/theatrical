name: Publish — C# SDK to NuGet

on:
  release:
    types: [published]

jobs:
  publish:
    if: startsWith(github.ref, 'refs/tags/v') && contains(github.ref, '-csharp')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk-csharp

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so MinVer can derive the version from the tag

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Pack
        run: dotnet pack src/Theatrical.Sdk/Theatrical.Sdk.csproj -c Release -o ./artifacts

      - name: Push to NuGet
        run: >-
          dotnet nuget push "./artifacts/*.nupkg"
          --api-key "${{ secrets.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
