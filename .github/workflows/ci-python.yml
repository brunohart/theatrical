name: CI — Python SDK

on:
  push:
    paths:
      - 'packages/sdk-py/**'
      - '.github/workflows/ci-python.yml'
  pull_request:
    paths:
      - 'packages/sdk-py/**'
      - '.github/workflows/ci-python.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk-py

    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Type check
        run: python -m mypy theatrical

      - name: Lint
        run: python -m ruff check theatrical tests

      - name: Test
        run: python -m pytest --cov=theatrical --cov-report=xml -v

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: packages/sdk-py/coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: packages/sdk-py

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build twine

      - name: Build
        run: python -m build

      - name: Check package
        run: python -m twine check dist/*

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: packages/sdk-py/dist/
