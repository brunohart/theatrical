[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "theatrical"
version = "0.1.0"
description = "Python SDK for cinema platform APIs. Type-safe async-first client with authentication, rate limiting, retry logic, and mock mode."
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "Bruno Hart" },
]
keywords = ["cinema", "api", "sdk", "ocapi", "ticketing"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]
dependencies = [
    "httpx>=0.27.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
    "mypy>=1.10.0",
    "ruff>=0.5.0",
]

[project.urls]
Homepage = "https://theatrical.dev"
Repository = "https://github.com/brunohart/theatrical"
Documentation = "https://github.com/brunohart/theatrical/tree/main/packages/sdk-py"
Changelog = "https://github.com/brunohart/theatrical/blob/main/packages/sdk-py/CHANGELOG.md"
"Bug Tracker" = "https://github.com/brunohart/theatrical/issues"

[tool.hatch.build.targets.wheel]
packages = ["theatrical"]

[tool.mypy]
strict = true
python_version = "3.10"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
target-version = "py310"
line-length = 100
