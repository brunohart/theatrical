<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.04"/></feComponentTransfer>
    </filter>
    <radialGradient id="glow" cx="50%" cy="46%" r="55%">
      <stop offset="0%" stop-color="#F5F0E1"/>
      <stop offset="100%" stop-color="#F0EDE6"/>
    </radialGradient>
  </defs>

  <!-- Warm patina ground + projector glow -->
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" filter="url(#grain)"/>

  <!-- Letterbox bars -->
  <rect x="0" y="0" width="1200" height="34" fill="#1A1A1A"/>
  <rect x="0" y="596" width="1200" height="34" fill="#1A1A1A"/>

  <!-- Sprocket rails -->
  <g fill="#F0EDE6" stroke="#1A1A1A" stroke-opacity="0.3">
    <rect x="26" y="70"  width="20" height="26" rx="4"/><rect x="26" y="118" width="20" height="26" rx="4"/>
    <rect x="26" y="166" width="20" height="26" rx="4"/><rect x="26" y="214" width="20" height="26" rx="4"/>
    <rect x="26" y="262" width="20" height="26" rx="4"/><rect x="26" y="310" width="20" height="26" rx="4"/>
    <rect x="26" y="358" width="20" height="26" rx="4"/><rect x="26" y="406" width="20" height="26" rx="4"/>
    <rect x="26" y="454" width="20" height="26" rx="4"/><rect x="26" y="502" width="20" height="26" rx="4"/>
    <rect x="1154" y="70"  width="20" height="26" rx="4"/><rect x="1154" y="118" width="20" height="26" rx="4"/>
    <rect x="1154" y="166" width="20" height="26" rx="4"/><rect x="1154" y="214" width="20" height="26" rx="4"/>
    <rect x="1154" y="262" width="20" height="26" rx="4"/><rect x="1154" y="310" width="20" height="26" rx="4"/>
    <rect x="1154" y="358" width="20" height="26" rx="4"/><rect x="1154" y="406" width="20" height="26" rx="4"/>
    <rect x="1154" y="454" width="20" height="26" rx="4"/><rect x="1154" y="502" width="20" height="26" rx="4"/>
  </g>

  <!-- Mark -->
  <g transform="translate(112,250)">
    <rect width="56" height="56" rx="10" fill="#1B2D4F"/>
    <rect x="14" y="14" width="28" height="28" rx="5" fill="#D4622B"/>
    <rect x="23" y="23" width="10" height="10" rx="2.5" fill="#F0EDE6"/>
  </g>

  <!-- Misregistration ghost bar (Rauschenberg) -->
  <rect x="186" y="306" width="520" height="6" rx="2" fill="#D4622B" opacity="0.30"/>

  <!-- Wordmark -->
  <text x="184" y="296" font-family="'Space Grotesk','Arial Black',sans-serif" font-size="96" font-weight="700" fill="#1A1A1A" letter-spacing="-4">theatrical</text>

  <!-- Tagline -->
  <text x="186" y="360" font-family="'Inter','Helvetica Neue',sans-serif" font-size="30" font-weight="400" fill="#8A8578">A developer platform for cinema technology</text>

  <!-- Mono languages -->
  <text x="186" y="430" font-family="'JetBrains Mono','SF Mono',monospace" font-size="20" font-weight="400" fill="#D4622B" letter-spacing="6">TYPESCRIPT &#183; C# &#183; PYTHON</text>

  <!-- Kicker -->
  <text x="186" y="478" font-family="'JetBrains Mono','SF Mono',monospace" font-size="15" font-weight="400" fill="#8A8578" letter-spacing="4">OPEN SOURCE &#183; 1,048 TESTS &#183; 6 PACKAGES</text>
</svg>
