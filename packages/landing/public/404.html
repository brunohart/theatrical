<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scene missing — Theatrical</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/cinema.css">
  <style>
    .lost { min-height: 100svh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 1rem; padding: 2rem; }
    .lost__code { font-family: var(--font-mono); font-size: var(--text-xs); letter-spacing: 0.3em; text-transform: uppercase; color: var(--orange); }
    .lost__title { font-family: var(--font-display); font-size: clamp(2.5rem, 9vw, 5rem); letter-spacing: -0.03em; }
    .lost__sub { color: var(--grey); max-width: 42ch; }
  </style>
</head>
<body>
  <div class="letterbox letterbox--top" aria-hidden="true"></div>
  <div class="letterbox letterbox--bottom" aria-hidden="true"></div>
  <div class="sprockets sprockets--left" aria-hidden="true"></div>
  <div class="sprockets sprockets--right" aria-hidden="true"></div>
  <div class="grain-static" aria-hidden="true"></div>
  <canvas class="grain" aria-hidden="true"></canvas>
  <div class="vignette" aria-hidden="true"></div>
  <div class="cursor" aria-hidden="true"></div>

  <main class="lost">
    <p class="lost__code">404 · Scene not found</p>
    <h1 class="lost__title">Cut. This take doesn’t exist.</h1>
    <p class="lost__sub">The reel you were looking for isn’t on this set. Let’s get you back to the main feature.</p>
    <a href="/" class="btn btn-primary">Back to the marquee</a>
  </main>

  <script src="/js/grain.js" defer></script>
  <script src="/js/cursor.js" defer></script>
</body>
</html>
